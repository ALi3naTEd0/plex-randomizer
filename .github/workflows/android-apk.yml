name: Build Android APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          cache: true

      - name: Verify Flutter toolchain
        run: |
          flutter --version
          flutter doctor -v

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Flet version
        run: |
          python -c "from importlib.metadata import version; print('flet', version('flet'))"

      - name: Build APK
        env:
          VERSION_CODE: ${{ github.run_number }}
        run: |
          echo "Using Android versionCode: ${VERSION_CODE}"
          flet build apk \
            --yes \
            --build-number "${VERSION_CODE}" \
            --android-adaptive-icon-background "#161C24" \
            --verbose

      - name: Collect APK artifacts
        run: |
          mkdir -p dist
          find . -type f -name "*.apk" -print
          find . -type f -name "*.apk" -exec cp {} dist/ \;
          if [ -z "$(ls -A dist)" ]; then
            echo "No APK file was generated"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: plex-movie-randomizer-apk-${{ github.run_number }}
          path: dist/*.apk
          if-no-files-found: error
