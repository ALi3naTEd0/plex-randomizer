name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verify Flutter toolchain
        run: |
          flutter --version
          flutter doctor -v

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet

      - name: Build APK
        env:
          VERSION_CODE: ${{ github.run_number }}
        run: |
          echo "Using Android versionCode: ${VERSION_CODE}"
          flet build apk --build-number "${VERSION_CODE}" --verbose

      - name: Collect APK artifacts
        run: |
          mkdir -p dist
          find . -type f -name "*.apk" -print
          find . -type f -name "*.apk" -exec cp {} dist/ \;
          if [ -z "$(ls -A dist)" ]; then
            echo "No APK file was generated"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: plex-movie-randomizer-apk-${{ github.run_number }}
          path: dist/*.apk
          if-no-files-found: error
