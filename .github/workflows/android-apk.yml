name: Build Android APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version name for Android (e.g. 1.0.0)"
        required: false
        default: ""
  push:
    tags:
      - "v*"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          cache: true

      - name: Verify Flutter toolchain
        run: |
          flutter --version
          flutter doctor -v

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Flet version
        run: |
          python -c "from importlib.metadata import version; print('flet', version('flet'))"

      - name: Prepare Android signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "Missing secret: ANDROID_KEYSTORE_BASE64"
            echo "Create a base64-encoded JKS secret so APK updates keep the same signature."
            exit 1
          fi

          KEYSTORE_PATH="${RUNNER_TEMP}/android-upload-keystore.jks"
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 -d > "${KEYSTORE_PATH}"
          test -s "${KEYSTORE_PATH}"
          echo "KEYSTORE_PATH=${KEYSTORE_PATH}" >> "${GITHUB_ENV}"

      - name: Build APK
        env:
          VERSION_CODE: ${{ github.run_number }}
          RELEASE_VERSION_INPUT: ${{ inputs.release_version }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          APP_VERSION="${RELEASE_VERSION_INPUT}"
          if [ -z "${APP_VERSION}" ]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [[ ! "${APP_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            APP_VERSION="1.0.0"
          fi

          if [ -z "${ANDROID_KEYSTORE_PASSWORD}" ] || [ -z "${ANDROID_KEY_ALIAS}" ] || [ -z "${ANDROID_KEY_PASSWORD}" ]; then
            echo "Missing signing secrets. Required: ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD"
            exit 1
          fi

          if [ -z "${KEYSTORE_PATH}" ] || [ ! -f "${KEYSTORE_PATH}" ]; then
            echo "Keystore file not found at: ${KEYSTORE_PATH}"
            exit 1
          fi

          echo "Using Android versionName: ${APP_VERSION}"
          echo "Using Android versionCode: ${VERSION_CODE}"
          flet build apk \
            --yes \
            --build-version "${APP_VERSION}" \
            --build-number "${VERSION_CODE}" \
            --android-signing-key-store "${KEYSTORE_PATH}" \
            --android-signing-key-store-password "${ANDROID_KEYSTORE_PASSWORD}" \
            --android-signing-key-alias "${ANDROID_KEY_ALIAS}" \
            --android-signing-key-password "${ANDROID_KEY_PASSWORD}" \
            --android-adaptive-icon-background "#161C24" \
            --verbose

      - name: Collect APK artifacts
        run: |
          mkdir -p dist
          find . -type f -name "*.apk" -print
          find . -type f -name "*.apk" -exec cp {} dist/ \;
          if [ -z "$(ls -A dist)" ]; then
            echo "No APK file was generated"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: plex-movie-randomizer-apk-${{ github.run_number }}
          path: dist/*.apk
          if-no-files-found: error
